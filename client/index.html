<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lifesystem</title>
    <!-- Use "nest" mode so Font Awesome inserts its <svg> *inside* each <i> instead of
         replacing it. Replacing the <i> breaks React reconciliation (removeChild errors /
         white screen) when icons are conditionally rendered. Must be set before the kit. -->
    <script>
      window.FontAwesomeConfig = { autoReplaceSvg: 'nest' }
    </script>
    <script src="https://kit.fontawesome.com/a07e376782.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
